<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Lottery 5 із 36 🎰</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --gold-color: #eab308;
            --text-color: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .header-controls { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }

        .btn-premium-buy { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; padding: 10px 14px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4); transition: transform 0.2s; }
        .btn-premium-buy:disabled { background: #334155; cursor: not-allowed; box-shadow: none; opacity: 0.6; }

        .container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }

        h1 { font-size: 24px; margin-bottom: 10px; color: var(--gold-color); }
        .balance-container { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        #balance-display { color: var(--success-color); }

        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }
        .num-btn { background: #334155; color: var(--text-color); border: none; padding: 12px 0; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .num-btn.selected { background: var(--accent-color); color: #000; transform: scale(1.05); }
        .num-btn.match { background: var(--gold-color) !important; color: #000 !important; animation: pulse 0.5s infinite alternate; }

        .balls-display { display: flex; justify-content: center; gap: 10px; min-height: 60px; margin: 20px 0; align-items: center; }
        .lottery-ball { 
            width: 45px; 
            height: 45px; 
            background: radial-gradient(circle at 30% 30%, #ffedd5, #ea580c); 
            color: #fff; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 18px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: var(--success-color); color: white; }
        .btn-primary:disabled { background: #1e293b; color: #64748b; border: 1px solid #334155; cursor: not-allowed; }
        .btn-secondary { background: #475569; color: white; }

        #status-message { margin: 15px 0; font-size: 15px; color: #94a3b8; min-height: 22px; }
        #selected-counter { font-weight: bold; margin-bottom: 5px; }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--gold-color); } 100% { box-shadow: 0 0 15px var(--gold-color); } }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-premium-buy" id="btn-buy-ua" onclick="buyUABalance()" disabled>⭐ Преміум: +500 UA (0.01 TON)</button>
        <div id="ton-connect-btn"></div>
    </div>

    <div class="container">
        <h1>🔮 UA Lottery 5 із 36 🎰</h1>
        <div class="balance-container">Баланс: <span id="balance-display">100 UA</span></div>
        <div id="selected-counter">Обрано: 0 / 5</div>
        <div id="status-message">Оберіть 5 чисел для початку гри</div>

        <div class="grid" id="grid-container"></div>
        <div class="balls-display" id="balls-container"></div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-play" onclick="startDraw()" disabled>ГРАТИ (Вартість: 10 UA)</button>
            <button class="btn btn-secondary" id="btn-auto" onclick="quickSelect()">⚡ Автовибір</button>
            <button class="btn btn-secondary" id="btn-clear" onclick="clearTicket()">Очистити</button>
            <button class="btn" id="btn-withdraw" style="background: #eab308; color: black; display: none;" onclick="withdrawFunds()">💳 Вивести Преміум виграш</button>
        </div>
    </div>
