<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Lottery 5 із 36 🎰</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --gold-color: #eab308;
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* Контейнер для кнопки гаманця зверху */
        .header-wallet {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--gold-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .balance-container {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #balance-display {
            color: var(--success-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .num-btn {
            background: #334155;
            color: var(--text-color);
            border: none;
            padding: 12px 0;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .num-btn:hover {
            background: #475569;
        }

        .num-btn.selected {
            background: var(--accent-color);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .num-btn.match {
            background: var(--gold-color) !important;
            color: #000 !important;
            animation: pulse 0.5s infinite alternate;
        }

        .balls-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 60px;
            margin: 20px 0;
            align-items: center;
        }

        .lottery-ball {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at 30% 30%, #ffedd5, #ea580c);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--success-color);
            color: white;
        }

        .btn-primary:disabled {
            background: #1e293b;
            color: #64748b;
            border: 1px solid #334155;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        #status-message {
            margin: 15px 0;
            font-size: 15px;
            min-height: 22px;
            color: #94a3b8;
        }

        #selected-counter {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        #selected-counter.ready {
            color: var(--success-color);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--gold-color); }
            100% { box-shadow: 0 0 15px var(--gold-color); }
        }
    </style>
</head>
<body>

    <div class="header-wallet">
        <div id="ton-connect-btn"></div>
    </div>

    <div class="container">
        <h1>💎 UA Lottery 5 із 36 🎰</h1>
        
        <div class="balance-container">
            Баланс: <span id="balance-display">0 UA</span>
        </div>

        <div id="selected-counter">Обрано: 0 / 5</div>
        <div id="status-message">Будь ласка, підключіть TON-гаманець для початку гри</div>

        <div class="grid" id="grid-container"></div>

        <div class="balls-display" id="balls-container"></div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-play" onclick="startDraw()" disabled>ГРАТИ (Вартість: 10 UA)</button>
            <button class="btn btn-secondary" id="btn-auto" onclick="quickSelect()" disabled>⚡ Автовибір</button>
            <button class="btn btn-secondary" style="background: #334155;" id="btn-clear" onclick="clearTicket()" disabled>Очистити</button>
        </div>
    </div>

    <script>
        const totalNumbers = 36;
        const maxSelections = 5;
        const ticketCost = 10; 

        let selectedNumbers = [];
        let winningNumbers = [];
        let isPlaying = false;
        let needResetAfterGame = false;
        let walletConnected = false; // Стан підключення гаманця
        
        let balance = parseInt(localStorage.getItem('userBalance')) || 100;

        // Ініціалізація TON Connect UI
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/5iz36/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // Слідкуємо за зміною стану гаманця (підключено/відключено)
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                walletConnected = true;
                document.getElementById('btn-auto').disabled = false;
                document.getElementById('btn-clear').disabled = false;
                updateUI();
            } else {
                walletConnected = false;
                document.getElementById('btn-play').disabled = true;
                document.getElementById('btn-auto').disabled = true;
                document.getElementById('btn-clear').disabled = true;
                document.getElementById('status-message').innerText = "Будь ласка, підключіть TON-гаманець для початку гри";
                clearTicket();
            }
        });

        // Ініціалізація ігрового поля
        const gridContainer = document.getElementById('grid-container');
        for (let i = 1; i <= totalNumbers; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.id = `num-${i}`;
            btn.onclick = () => toggleNumber(i);
            gridContainer.appendChild(btn);
        }

        updateUI();

        function toggleNumber(num) {
            if (isPlaying || !walletConnected) return; // Без гаманця клікати не можна
            
            if (needResetAfterGame) {
                clearTicket();
                needResetAfterGame = false;
            }

            playClickSound();
            
            const btn = document.getElementById(`num-${num}`);
            const index = selectedNumbers.indexOf(num);
            
            if (index > -1) {
                selectedNumbers.splice(index, 1);
                btn.classList.remove('selected');
            } else {
                if (selectedNumbers.length >= maxSelections) return;
                selectedNumbers.push(num);
                btn.classList.add('selected');
            }
            updateUI();
        }

        function updateUI() {
            if (!walletConnected) return; // Якщо гаманець не підключено, не оновлюємо ігрові повідомлення

            if (balance < ticketCost && !isPlaying) {
                balance += 100;
                alert("🎁 Подарунок! Рахунок відновлено, тримайте +100 UA для гри!");
            }

            const counter = document.getElementById('selected-counter');
            const playBtn = document.getElementById('btn-play');
            
            counter.innerText = `Обрано: ${selectedNumbers.length} / ${maxSelections}`;
            
            if (selectedNumbers.length === maxSelections) {
                counter.classList.add('ready');
                if (!isPlaying) playBtn.disabled = false;
                document.getElementById('status-message').innerText = "Квиток заповнено! Натисніть ГРАТИ!";
            } else {
                counter.classList.remove('ready');
                playBtn.disabled = true;
                document.getElementById('status-message').innerText = `Оберіть ще ${maxSelections - selectedNumbers.length} чисел`;
            }
            
            document.getElementById('balance-display').innerText = `${balance} UA`;
            localStorage.setItem('userBalance', balance);
        }

        function quickSelect() {
            if (isPlaying || !walletConnected) return;
            clearTicket(); 
            needResetAfterGame = false;

            while (selectedNumbers.length < maxSelections) {
                let rand = Math.floor(Math.random() * totalNumbers) + 1;
                if (!selectedNumbers.includes(rand)) {
                    selectedNumbers.push(rand);
                    document.getElementById(`num-${rand}`).classList.add('selected');
                }
            }
            updateUI();
        }

        function clearTicket() {
            if (isPlaying) return;
            for (let i = 1; i <= totalNumbers; i++) {
                const btn = document.getElementById(`num-${i}`);
                if (btn) {
                    btn.classList.remove('selected');
                    btn.classList.remove('match');
                }
            }
            document.getElementById('balls-container').innerHTML = '';
            selectedNumbers = [];
            if (walletConnected) updateUI();
        }

        async function startDraw() {
            if (isPlaying || !walletConnected || selectedNumbers.length < maxSelections) return;
            
            if (balance < ticketCost) {
                alert("Недостатньо коштів для гри!");
                return;
            }

            isPlaying = true;
            needResetAfterGame = false;
            balance -= ticketCost;
            updateUI();
            
            document.getElementById('btn-play').disabled = true;
            document.getElementById('status-message').innerText = "🎰 Лототрон запускається... Очікуйте куль!";
            
            const ballsContainer = document.getElementById('balls-container');
            ballsContainer.innerHTML = ''; 
            
            for (let i = 1; i <= totalNumbers; i++) {
                document.getElementById(`num-${i}`).classList.remove('match');
            }
            winningNumbers = [];

            while (winningNumbers.length < maxSelections) {
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                let rand = Math.floor(Math.random() * totalNumbers) + 1;
                if (!winningNumbers.includes(rand)) {
                    winningNumbers.push(rand);
                    playBallSound();
                    
                    const ball = document.createElement('div');
                    ball.className = 'lottery-ball pop-in';
                    ball.innerText = rand;
                    ballsContainer.appendChild(ball);
                    
                    if (selectedNumbers.includes(rand)) {
                        document.getElementById(`num-${rand}`).classList.add('match');
                    }
                }
            }

            checkResults();
        }

        function checkResults() {
            const matches = selectedNumbers.filter(num => winningNumbers.includes(num)).length;
            let winAmount = 0;

            if (matches === 5) {
                winAmount = 50000;
                document.getElementById('status-message').innerHTML = `👑 <b style="color:var(--gold-color)">ДЖЕКПОТ! Виграш: +${winAmount} UA!</b>`;
                playWinSound();
            } else if (matches === 4) {
                winAmount = 1500;
                document.getElementById('status-message').innerHTML = `🔥 <b style="color:var(--accent-color)">4 числа! Виграш: +${winAmount} UA!</b>`;
                playWinSound();
            } else if (matches > 0) {
                winAmount = matches * 10;
                document.getElementById('status-message').innerText = `🎉 Збігів: ${matches}. Виграш: +${winAmount} UA!`;
                playWinSound();
            } else {
                document.getElementById('status-message').innerText = "😔 Не пощастило. Натисніть на будь-яке число для нової гри!";
                playLoseSound();
            }

            balance += winAmount;
            isPlaying = false; 
            needResetAfterGame = true; 
            
            if (winAmount >= 1500) {
                setTimeout(() => {
                    alert(`💳 Ваш виграш ${winAmount} UA успішно зафіксовано для гаманця: ${tonConnectUI.account.address.slice(0,6)}...${tonConnectUI.account.address.slice(-4)}`);
                }, 1200);
            }

            updateUI();
        }

        function playClickSound() { playTone(440, 'sine', 0.05); }
        function playBallSound() { playTone(587.33, 'triangle', 0.08); }
        function playLoseSound() { playTone(220, 'sawtooth', 0.3); }
        function playWinSound() { 
            playTone(523.25, 'sine', 0.08); 
            setTimeout(() => playTone(659.25, 'sine', 0.08), 80);
            setTimeout(() => playTone(783.99, 'sine', 0.25), 160);
        }

        function playTone(freq, type, duration) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
    </script>
</body>
</html>
