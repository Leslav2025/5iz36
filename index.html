<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Lottery 5 із 36 🎰</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent-color: #38bdf8; --success-color: #22c55e; --gold-color: #eab308; }
        body { background-color: var(--bg-color); color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        .container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 16px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }
        .num-btn { background: #334155; color: white; border: none; padding: 12px 0; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .num-btn.selected { background: var(--accent-color); color: black; }
        .num-btn.match { background: var(--gold-color) !important; color: black !important; }
        /* Стиль кульки */
        .balls-display { display: flex; justify-content: center; gap: 8px; height: 50px; margin: 20px 0; }
        .lottery-ball { width: 40px; height: 40px; background: #ea580c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: popIn 0.5s forwards; }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>💎 UA Lottery</h1>
    <div style="font-size: 20px; margin: 10px;">Баланс: <span id="balance-display">0</span> UA</div>
    <div id="grid-container" class="grid"></div>
    <div id="balls-container" class="balls-display"></div>
    <button class="btn" style="background: #22c55e; color: white;" id="btn-play" onclick="startDraw()">ГРАТИ (100 UA)</button>
    <button class="btn" style="background: #eab308; display: none;" id="btn-withdraw" onclick="withdraw()">💳 Вивести</button>
</div>

<script>
    let balance = parseInt(localStorage.getItem('userBalance')) || 500;
    let selected = [];
    let isDrawing = false;

    // Створення кнопок
    const grid = document.getElementById('grid-container');
    for (let i = 1; i <= 36; i++) {
        let btn = document.createElement('button');
        btn.className = 'num-btn'; btn.innerText = i;
        btn.onclick = () => {
            if(isDrawing) return;
            if(selected.includes(i)) { selected = selected.filter(n => n !== i); btn.className = 'num-btn'; }
            else if(selected.length < 5) { selected.push(i); btn.className = 'num-btn selected'; }
        };
        grid.appendChild(btn);
    }

    async function startDraw() {
        if(selected.length < 5 || balance < 100 || isDrawing) return;
        isDrawing = true;
        balance -= 100;
        document.getElementById('balance-display').innerText = balance;
        document.getElementById('balls-container').innerHTML = '';
        
        let drawn = [];
        while(drawn.length < 5) {
            let num = Math.floor(Math.random() * 36) + 1;
            if(!drawn.includes(num)) {
                drawn.push(num);
                // Створення кульки
                let ball = document.createElement('div');
                ball.className = 'lottery-ball';
                ball.innerText = num;
                document.getElementById('balls-container').appendChild(ball);
                
                // Підсвітка збігу
                if(selected.includes(num)) document.getElementById('grid-container').children[num-1].classList.add('match');
                
                // ПАУЗА ДЛЯ АНІМАЦІЇ
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        isDrawing = false;
        checkWin(selected.filter(n => drawn.includes(n)).length);
    }

    function checkWin(matches) {
        let win = matches === 5 ? 50000 : matches === 4 ? 1500 : matches * 20;
        if(win > 0) { balance += win; alert('Виграш: ' + win + ' UA!'); }
        localStorage.setItem('userBalance', balance);
        document.getElementById('balance-display').innerText = balance;
        document.getElementById('btn-withdraw').style.display = balance >= 5000 ? 'block' : 'none';
    }

    function withdraw() {
        window.location.href = `https://t.me/Leslav?text=Вивід:${balance}UA`;
    }
    
    document.getElementById('balance-display').innerText = balance;
</script>
</body>
</html>
