<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Боулінг Клуб</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхня панель (Header) */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1f2937;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 2px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header-title {
            color: #f59e0b;
            text-align: center;
            font-size: 20px;
            padding: 5px 0;
            background-color: #111827;
        }

        /* Ігрова зона */
        .game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #111827;
        }
        canvas {
            background-color: #1e3a8a; /* Колір бортів */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Підказка знизу */
        .footer-hint {
            text-align: center;
            padding: 10px;
            background-color: #1f2937;
            color: #9ca3af;
            font-size: 14px;
            border-top: 1px solid #374151;
        }
    </style>
</head>
<body>

    <div class="header-title">Bowling Club</div>
    
    <div class="header-panel">
        <div>Фрейм: <span id="frame-val">7/10</span></div>
        <div>Кидок: <span id="throw-val">1</span></div>
        <div>Очки: <span id="score-val">5</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="footer-hint">Штовхни кулю пальцем вгору, щоб зробити кидок! 🎳</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Налаштування адаптивності Canvas
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.width = size * 0.95;
            canvas.height = size * 1.5;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const laneColor = '#d97706'; // Помаранчева доріжка

        // Функція генерації масиву з 10 кеглів
        function generatePins() {
            return [
                {x: 0.5, y: 0.15, active: true},
                {x: 0.45, y: 0.12, active: true}, {x: 0.55, y: 0.12, active: true},
                {x: 0.4, y: 0.09, active: true}, {x: 0.5, y: 0.09, active: true}, {x: 0.6, y: 0.09, active: true},
                {x: 0.35, y: 0.06, active: true}, {x: 0.45, y: 0.06, active: true}, {x: 0.55, y: 0.06, active: true}, {x: 0.65, y: 0.06, active: true}
            ];
        }

        let pins = generatePins();
        let currentFrame = 7;
        let currentThrow = 1;
        let score = 5;

        let ball = {
            x: canvas.width / 2,
            y: canvas.height * 0.85,
            radius: 15,
            vx: 0,
            vy: 0,
            isMoving: false
        };

        let touchStartX = 0;
        let touchStartY = 0;
        let messageToShow = ""; 
        let messageTimer = 0;

        canvas.addEventListener('touchstart', (e) => {
            if (ball.isMoving) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (ball.isMoving) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // Запуск кулі від свайпу вгору
            if (diffY < -30) {
                ball.vx = diffX * 0.04; 
                ball.vy = diffY * 0.04; 
                ball.isMoving = true;
            }
        });

        function checkCollisions() {
            pins.forEach(pin => {
                if (!pin.active) return;
                
                const pinX = pin.x * canvas.width;
                const pinY = pin.y * canvas.height;
                const pinRadius = 8;

                const dist = Math.hypot(ball.x - pinX, ball.y - pinY);
                if (dist < ball.radius + pinRadius) {
                    pin.active = false; // Збиваємо кеглю
                    score += 1;
                    document.getElementById('score-val').innerText = score;
                }
            });
        }

        // Керування раундами та фреймами
        function handleNextTurn() {
            const activePinsCount = pins.filter(p => p.active).length;

            if (activePinsCount === 0) {
                // Якщо збито всі кеглі
                if (currentThrow === 1) {
                    messageToShow = "STRIKE! 🔥";
                } else {
                    messageToShow = "SPARE! ✨";
                }
                messageTimer = 90; // Ефект на 1.5 секунди
                resetRound(true);  // Повний ресет кеглів
            } else {
                // Якщо якісь кеглі встояли
                if (currentThrow === 1) {
                    currentThrow = 2;
                    document.getElementById('throw-val').innerText = currentThrow;
                    resetRound(false); // Куля повертається, кеглі лишаються
                } else {
                    messageToShow = "Наступний фрейм!";
                    messageTimer = 60;
                    resetRound(true);  // Новий фрейм — нові кеглі
                }
            }
        }

        function resetRound(fullReset) {
            ball.isMoving = false;
            ball.x = canvas.width / 2;
            ball.y = canvas.height * 0.85;
            ball.vx = 0;
            ball.vy = 0;

            if (fullReset) {
                pins = generatePins();
                currentThrow = 1;
                if (currentFrame < 10) {
                    currentFrame += 1;
                } else {
                    currentFrame = 1; // Зациклюємо гру після 10 фреймів
                    score = 0;
                    document.getElementById('score-val').innerText = score;
                }
                document.getElementById('frame-val').innerText = currentFrame + "/10";
                document.getElementById('throw-val').innerText = currentThrow;
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Доріжка
            const laneWidth = canvas.width * 0.7;
            const laneX = (canvas.width - laneWidth) / 2;
            ctx.fillStyle = laneColor;
            ctx.fillRect(laneX, 0, laneWidth, canvas.height);

            // Розмітка доріжки (пунктир)
            ctx.strokeStyle = '#b45309';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(laneX, 0); ctx.lineTo(laneX, canvas.height);
            ctx.moveTo(laneX + laneWidth, 0); ctx.lineTo(laneX + laneWidth, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Фізика руху кулі
            if (ball.isMoving) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                checkCollisions();

                // Якщо куля покинула межі доріжки
                if (ball.y < 0 || ball.x < 0 || ball.x > canvas.width) {
                    handleNextTurn();
                }
            }

            // Рендер кеглів
            pins.forEach(pin => {
                if (!pin.active) return;
                ctx.beginPath();
                ctx.arc(pin.x * canvas.width, pin.y * canvas.height, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.closePath();
            });

            // Рендер кулі
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#a855f7';
            ctx.fill();
            ctx.strokeStyle = '#7e22ce';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // Виведення тексту подій (Strike/Spare)
            if (messageTimer > 0) {
                ctx.fillStyle = "#f59e0b";
                ctx.font = "bold 30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(messageToShow, canvas.width / 2, canvas.height / 2);
                messageTimer--;
            }

            requestAnimationFrame(update);
        }

        update();
    </script>
</body>
</html>
