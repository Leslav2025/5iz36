<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA Lottery 5 із 36 + TON</title>
    <!-- Підключаємо офіційний TON Connect UI та бібліотеку Конфетті -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            margin-top: 10px;
        }
        .header-ton {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        #ton-connect-btn {
            scale: 0.9;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-val {
            font-weight: bold;
            color: #38bdf8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .cell {
            aspect-ratio: 1;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .cell:active {
            transform: scale(0.9);
        }
        .cell.selected {
            background: #f59e0b;
            border-color: #fbbf24;
            color: #0f172a;
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.6);
        }
        .drum-section {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        #drum-status {
            font-size: 14px;
            color: #cbd5e1;
        }
        .ball-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 54px;
            align-items: center;
            margin-top: 10px;
        }
        .result-ball {
            width: 44px;
            height: 44px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #2563eb);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            width: 100%;
        }
        .btn-ton-pay {
            background: #0098ea;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 152, 234, 0.4);
            margin-top: 12px;
            width: 100%;
            display: none;
        }
        .btn-secondary {
            background: #475569;
            color: #f8fafc;
        }
        .message-box {
            font-size: 14px;
            font-weight: 500;
            min-height: 24px;
            color: #38bdf8;
            margin-top: 12px;
            line-height: 1.4;
        }

        /* СТИЛІ МОДАЛЬНОГО ВІКНА ВИВЕДЕННЯ КОШТІВ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        .modal-content {
            background: #1e293b;
            color: #f8fafc;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 2px solid #fbbf24;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .modal-title {
            color: #fbbf24;
            font-size: 22px;
            margin-bottom: 15px;
        }
        .modal-prize {
            font-size: 28px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }
        .modal-desc {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn-modal-claim {
            display: block;
            background: #0088cc;
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
            transition: all 0.2s ease;
        }
        .btn-modal-claim:active {
            transform: scale(0.97);
        }
        .btn-modal-close {
            background: transparent;
            color: #94a3b8;
            font-size: 14px;
            margin-top: 15px;
            text-decoration: underline;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ton">
        <h1>UA LOTTERY</h1>
        <div id="ton-connect-btn"></div>
    </div>
    
    <div class="subtitle">Обери 5 чисел із 36</div>

    <div class="stats-panel">
        <div>Баланс: <span id="balance" class="stat-val">0</span> UA</div>
        <div>Ставка: <span class="stat-val">50</span> UA</div>
    </div>

    <div class="grid" id="lottery-grid"></div>

    <div class="btn-group">
        <button class="btn-secondary" onclick="autoSelect()">Автовибір</button>
        <button class="btn-secondary" onclick="clearSelection()">Очистити</button>
    </div>

    <div class="drum-section">
        <div id="drum-status">Лототрон чекає на ставку</div>
        <div class="ball-container" id="winning-balls"></div>
    </div>

    <button class="btn-primary" id="btn-play" onclick="handlePlayClick()" disabled>Зробити ставку</button>
    
    <!-- Кнопка купівлі монет UA -->
    <button class="btn-ton-pay" id="btn-buy-coins" onclick="buyCoinsWithTon()">Поповнити: 1000 UA за 0.01 TON</button>
    
    <div class="message-box" id="message"></div>
</div>

<!-- РОЗУМНЕ ВІКНО ВИПЛАТИ -->
<div class="modal-overlay" id="win-modal">
    <div class="modal-content">
        <h2 class="modal-title">🎉 Великий виграш! 🎉</h2>
        <div class="modal-prize" id="modal-prize-val">0 UA</div>
        <p class="modal-desc">
            Ваш гаманець та сума зафіксовані. Натисніть кнопку нижче, щоб автоматично надіслати заявку в наш бот виплат.
        </p>
        <a id="modal-claim-link" href="#" target="_blank" class="btn-modal-claim" onclick="closeWinModal()">
            Отримати виплату в боті 🚀
        </a>
        <button class="btn-modal-close" onclick="closeWinModal()">Залишити на балансі гри</button>
    </div>
</div>

<script>
    // ТВІЙ ГАМАНЕЦЬ ДЛЯ ОТРИМАННЯ ОПЛАТИ
    const MY_TON_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw"; 

    const TOTAL_NUMBERS = 36;
    const REQUIRED_SELECTION = 5;
    const TICKET_COST = 50;
    
    let selectedNumbers = [];
    
    // Завантажуємо збережений баланс або ставимо 0
    let balance = parseInt(localStorage.getItem('ua_lottery_balance')) || 0; 
    document.getElementById('balance').innerText = balance;

    let isPlaying = false;

    // Вбудований звуковий рушій браузера (Web Audio API)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(freq, type, duration, vol = 0.1) {
        try {
            initAudio();
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {
            console.error("Помилка звуку:", e);
        }
    }

    function playClickSound() { playSound(600, 'sine', 0.08, 0.15); }
    function playBallSound() { playSound(450, 'triangle', 0.15, 0.2); }
    function playWinSound() {
        playSound(523.25, 'sine', 0.15, 0.15); 
        setTimeout(() => playSound(659.25, 'sine', 0.15, 0.15), 100); 
        setTimeout(() => {
            playSound(783.99, 'sine', 0.3, 0.2); 
            triggerConfetti();
        }, 200);
    }
    function playEpicWinSound() {
        let t = 0;
        const intervals = [523, 659, 784, 1046, 1318];
        intervals.forEach((f, idx) => {
            setTimeout(() => {
                playSound(f, 'sine', 0.25, 0.2);
                triggerConfetti();
            }, idx * 120);
        });
    }
    function playLoseSound() {
        playSound(220, 'sawtooth', 0.4, 0.1); 
    }

    function triggerConfetti() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.65 }
        });
    }

    // Ініціалізація TON Connect UI
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/5iz36/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    if (localStorage.getItem('pending_payment') === 'true') {
        balance += 1000;
        localStorage.setItem('ua_lottery_balance', balance);
        localStorage.removeItem('pending_payment');
        document.getElementById('balance').innerText = balance;
        document.getElementById('message').style.color = '#10b981';
        document.getElementById('message').innerText = "Баланс успішно оновлено: +1000 UA 💎";
        playWinSound();
    }

    // Створення сітки
    const grid = document.getElementById('lottery-grid');
    for (let i = 1; i <= TOTAL_NUMBERS; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i;
        cell.onclick = () => { initAudio(); toggleNumber(i, cell); };
        grid.appendChild(cell);
    }

    function toggleNumber(num, cellElement) {
        if (isPlaying) return;
        playClickSound();
        const index = selectedNumbers.indexOf(num);
        if (index > -1) {
            selectedNumbers.splice(index, 1);
            cellElement.classList.remove('selected');
        } else {
            if (selectedNumbers.length >= REQUIRED_SELECTION) return;
            selectedNumbers.push(num);
            cellElement.classList.add('selected');
        }
        updatePlayButtonState();
    }

    function updatePlayButtonState() {
        const btnPlay = document.getElementById('btn-play');
        const btnBuy = document.getElementById('btn-buy-coins');
        
        btnPlay.disabled = selectedNumbers.length !== REQUIRED_SELECTION || isPlaying;
        
        if (balance < TICKET_COST) {
            btnBuy.style.display = "block";
        } else {
            btnBuy.style.display = "none";
        }
    }

    updatePlayButtonState();

    function handlePlayClick() {
        initAudio();
        if (balance < TICKET_COST) {
            document.getElementById('message').style.color = '#ef4444';
            document.getElementById('message').innerText = "Недостатньо балансу UA! Поповніть через TON нижче.";
            return;
        }
        startRaffle();
    }

    async function buyCoinsWithTon() {
        initAudio();
        if (!tonConnectUI.connected) {
            alert("Будь ласка, спочатку підключіть свій TON-гаманець кнопкою у верхньому правому кутку!");
            return;
        }

        document.getElementById('message').style.color = '#38bdf8';
        document.getElementById('message').innerText = "Відкриваємо гаманець... Підтвердіть оплату.";

        localStorage.setItem('pending_payment', 'true');

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 120,
            messages: [
                {
                    address: MY_TON_WALLET,
                    amount: "10000000" // 0.01 TON
                }
            ]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            
            balance += 1000;
            localStorage.setItem('ua_lottery_balance', balance);
            localStorage.removeItem('pending_payment');
            document.getElementById('balance').innerText = balance;
            document.getElementById('message').style.color = '#10b981';
            document.getElementById('message').innerText = "Успішно нараховано +1000 UA 💎";
            playWinSound();
            updatePlayButtonState();

        } catch (error) {
            console.error(error);
            localStorage.removeItem('pending_payment');
            document.getElementById('message').style.color = '#ef4444';
            document.getElementById('message').innerText = "Оплату скасовано або стався збій.";
        }
    }

    function autoSelect() {
        if (isPlaying) return;
        initAudio();
        playClickSound();
        clearSelection();
        while (selectedNumbers.length < REQUIRED_SELECTION) {
            const rand = Math.floor(Math.random() * TOTAL_NUMBERS) + 1;
            if (!selectedNumbers.includes(rand)) selectedNumbers.push(rand);
        }
        document.querySelectorAll('.cell').forEach((cell, idx) => {
            if (selectedNumbers.includes(idx + 1)) cell.classList.add('selected');
        });
        updatePlayButtonState();
    }

    function clearSelection() {
        if (isPlaying) return;
        initAudio();
        playClickSound();
        selectedNumbers = [];
        document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('selected'));
        updatePlayButtonState();
    }

    function startRaffle() {
        isPlaying = true;
        balance -= TICKET_COST;
        localStorage.setItem('ua_lottery_balance', balance);
        document.getElementById('balance').innerText = balance;
        updatePlayButtonState();
        
        document.getElementById('message').innerText = "";
        document.getElementById('drum-status').innerText = "Лототрон перемішує кульки...";
        const ballContainer = document.getElementById('winning-balls');
        ballContainer.innerHTML = '';

        let winningNumbers = [];
        while (winningNumbers.length < REQUIRED_SELECTION) {
            const rand = Math.floor(Math.random() * TOTAL_NUMBERS) + 1;
            if (!winningNumbers.includes(rand)) winningNumbers.push(rand);
        }

        let step = 0;
        const interval = setInterval(() => {
            if (step < REQUIRED_SELECTION) {
                playBallSound();
                const ball = document.createElement('div');
                ball.className = 'result-ball';
                ball.innerText = winningNumbers[step];
                ballContainer.appendChild(ball);
                step++;
            } else {
                clearInterval(interval);
                checkResults(winningNumbers);
            }
        }, 800);
    }

    // ОНОВЛЕНА ФУНКЦІЯ АВТО-ЗАПОВНЕННЯ ТЕКСТУ
    function triggerWithdrawalModal(prizeAmount) {
        let userWallet = "Не підключено";
        if (tonConnectUI.account && tonConnectUI.account.address) {
            userWallet = tonConnectUI.account.address;
        }

        const gameName = "UA GOLDEN HUB"; // Змінив назву проекту під твій хаб з фото
        
        // Формуємо текст повідомлення точно як у твоєму прикладі
        const messageText = `💰 Сума: ${prizeAmount} UA\n💳 Гаманець: ${userWallet}\n🎮 Проект: ${gameName}`;
        
        // Кодуємо спецсимволи та пробіли для посилання
        const encodedText = encodeURIComponent(messageText);
        
        // Посилання, яке самостійно пише текст у віконце введення
        const telegramBotLink = `https://t.me/tokenpist_bot?text=${encodedText}`;
        
        document.getElementById('modal-prize-val').innerText = `${prizeAmount} UA`;
        document.getElementById('modal-claim-link').href = telegramBotLink;
        
        document.getElementById('win-modal').style.display = 'flex';
    }

    function closeWinModal() {
        document.getElementById('win-modal').style.display = 'none';
    }

    function checkResults(winningNumbers) {
        const matches = selectedNumbers.filter(num => winningNumbers.includes(num)).length;
        let prize = 0;

        if (matches === 2) prize = 50;
        else if (matches === 3) prize = 250;
        else if (matches === 4) prize = 1500;
        else if (matches === 5) prize = 50000;

        balance += prize;
        localStorage.setItem('ua_lottery_balance', balance);
        document.getElementById('balance').innerText = balance;
        document.getElementById('drum-status').innerText = "Розіграш завершено!";
        
        const msgElement = document.getElementById('message');
        if (prize > 0) {
            msgElement.style.color = '#10b981';
            msgElement.innerText = `Вгадано чисел: ${matches}! Ваш виграш: +${prize} UA 🎉`;
            
            if (matches >= 4) {
                playEpicWinSound();
                setTimeout(() => { triggerWithdrawalModal(prize); }, 1500);
            } else {
                playWinSound();
                if (prize >= 250) {
                    setTimeout(() => { triggerWithdrawalModal(prize); }, 1500);
                }
            }
        } else {
            msgElement.style.color = '#ef4444';
            msgElement.innerText = `Вгадано чисел: ${matches}. Пощастить наступного разу!`;
            playLoseSound();
        }

        isPlaying = false;
        updatePlayButtonState();
    }
</script>
</body>
</html>
