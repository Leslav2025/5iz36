<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Lottery 5 із 36 🎰</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --gold-color: #eab308;
            --text-color: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

        .header-controls { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }

        .btn-premium-buy { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; padding: 10px 14px; font-size: 13px; font-weight: bold; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4); transition: transform 0.2s; }
        .btn-premium-buy:disabled { background: #334155; cursor: not-allowed; box-shadow: none; opacity: 0.6; }

        .container { max-width: 500px; width: 100%; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }

        h1 { font-size: 24px; margin-bottom: 10px; color: var(--gold-color); }
        .balance-container { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; font-weight: bold; }
        #balance-display { color: var(--success-color); }

        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px; }
        .num-btn { background: #334155; color: var(--text-color); border: none; padding: 12px 0; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .num-btn.selected { background: var(--accent-color); color: #000; transform: scale(1.05); }
        .num-btn.match { background: var(--gold-color) !important; color: #000 !important; animation: pulse 0.5s infinite alternate; }

        .balls-display { display: flex; justify-content: center; gap: 10px; min-height: 60px; margin: 20px 0; align-items: center; }
        .lottery-ball { 
            width: 45px; 
            height: 45px; 
            background: radial-gradient(circle at 30% 30%, #ffedd5, #ea580c); 
            color: #fff; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 18px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: var(--success-color); color: white; }
        .btn-primary:disabled { background: #1e293b; color: #64748b; border: 1px solid #334155; cursor: not-allowed; }
        .btn-secondary { background: #475569; color: white; }

        #status-message { margin: 15px 0; font-size: 15px; color: #94a3b8; min-height: 22px; }
        #selected-counter { font-weight: bold; margin-bottom: 5px; }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--gold-color); } 100% { box-shadow: 0 0 15px var(--gold-color); } }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-premium-buy" id="btn-buy-ua" onclick="buyUABalance()" disabled>⭐ Преміум: +500 UA (0.01 TON)</button>
        <div id="ton-connect-btn"></div>
    </div>

    <div class="container">
        <h1>🔮 UA Lottery 5 із 36 🎰</h1>
        <div class="balance-container">Баланс: <span id="balance-display">100 UA</span></div>
        <div id="selected-counter">Обрано: 0 / 5</div>
        <div id="status-message">Оберіть 5 чисел для початку гри</div>

        <div class="grid" id="grid-container"></div>
        <div class="balls-display" id="balls-container"></div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-play" onclick="startDraw()" disabled>ГРАТИ (Вартість: 10 UA)</button>
            <button class="btn btn-secondary" id="btn-auto" onclick="quickSelect()">⚡ Автовибір</button>
            <button class="btn btn-secondary" id="btn-clear" onclick="clearTicket()">Очистити</button>
            <button class="btn" id="btn-withdraw" style="background: #eab308; color: black; display: none;" onclick="withdrawFunds()">💳 Вивести Преміум виграш</button>
        </div>
    </div>

    <script>
        // Безпечний аудіо-рушій (Web Audio API). Окремий блок, який не зламає інтерфейс
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log("Web Audio API не підтримується");
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'ball') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'win') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                } else if (type === 'lose') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.3);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'bonus') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                }
            } catch (e) { console.log("Помилка відтворення звуку:", e); }
        }

        const totalNumbers = 36, maxSelections = 5, ticketCost = 10;
        let selectedNumbers = [], winningNumbers = [], isPlaying = false, needResetAfterGame = false, walletConnected = false;
        
        let balance = parseInt(localStorage.getItem('userBalance'));
        if (isNaN(balance) || balance <= 0) { balance = 100; }

        // Ініціалізація TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/5iz36/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            const buyBtn = document.getElementById('btn-buy-ua');
            if (wallet) {
                walletConnected = true;
                buyBtn.disabled = false;
                buyBtn.innerText = "⭐ Купити +500 UA (0.01 TON)";
            } else {
                walletConnected = false;
                buyBtn.disabled = true;
                buyBtn.innerText = "⭐ Преміум (Підключіть гаманець)";
            }
            updateUI();
        });

        // Створення кнопок на полі
        const gridContainer = document.getElementById('grid-container');
        for (let i = 1; i <= totalNumbers; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn'; btn.innerText = i; btn.id = `num-${i}`;
            btn.onclick = () => { playSound('click'); toggleNumber(i); };
            gridContainer.appendChild(btn);
        }

        function toggleNumber(num) {
            if (isPlaying) return;
            if (needResetAfterGame) { clearTicket(); needResetAfterGame = false; }
            const btn = document.getElementById(`num-${num}`);
            const index = selectedNumbers.indexOf(num);
            if (index > -1) { selectedNumbers.splice(index, 1); btn.classList.remove('selected'); }
            else if (selectedNumbers.length < maxSelections) { selectedNumbers.push(num); btn.classList.add('selected'); }
            updateUI();
        }

        function updateUI() {
            const withdrawBtn = document.getElementById('btn-withdraw');
            if (walletConnected && balance >= 5000) { withdrawBtn.style.display = 'block'; } 
            else { withdrawBtn.style.display = 'none'; }
            
            const counter = document.getElementById('selected-counter');
            counter.innerText = `Обрано: ${selectedNumbers.length} / ${maxSelections}`;
            
            const playBtn = document.getElementById('btn-play');
            if (selectedNumbers.length === maxSelections) {
                if (!isPlaying) playBtn.disabled = false;
                document.getElementById('status-message').innerText = "Квиток заповнено! Натисніть ГРАТИ!";
            } else {
                playBtn.disabled = true;
                document.getElementById('status-message').innerText = `Оберіть ще ${maxSelections - selectedNumbers.length} чисел`;
            }
            
            document.getElementById('balance-display').innerText = `${balance} UA`;
            localStorage.setItem('userBalance', balance);
        }

        async function buyUABalance() {
            if (!walletConnected || isPlaying) return;
            initAudio();
            document.getElementById('status-message').innerText = "⏳ Очікування підтвердження транзакції...";
            
            const nanoTons = BigInt(10000000); // 0.01 TON
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 180,
                messages: [{ 
                    address: "UQBh_d7w5_rshHwS3pZ8zXOnM2n4b0v5R_YpXpHCJ8GwA_Hh", 
                    amount: nanoTons.toString()
                }]
            };
            
            try {
                await tonConnectUI.sendTransaction(transaction);
                playSound('bonus');
                balance += 500;
                updateUI();
                document.getElementById('status-message').innerText = "⭐ Баланс успішно поповнено на +500 UA!";
                alert("⭐ Успішно! Ваш баланс поповнено на +500 UA!");
            } catch (e) { 
                console.error("Помилка TON Connect:", e);
                document.getElementById('status-message').innerText = "❌ Помилка транзакції.";
                alert("❌ Транзакцію скасовано або сталася помилка."); 
                updateUI(); 
            }
        }

        function withdrawFunds() {
            if(!walletConnected) return;
            const message = encodeURIComponent(`🎰 Запит на виведення Преміум виграшу!\n\n💰 Сума: ${balance} UA\n💳 Гаманець: ${tonConnectUI.account.address}\n🎮 Гра: UA Lottery 5 із 36`);
            window.location.href = `https://t.me/Leslav?text=${message}`;
        }

        function quickSelect() {
            if (isPlaying) return;
            playSound('click');
            clearTicket();
            needResetAfterGame = false;
            while (selectedNumbers.length < maxSelections) {
                let rand = Math.floor(Math.random() * totalNumbers) + 1;
                if (!selectedNumbers.includes(rand)) { selectedNumbers.push(rand); document.getElementById(`num-${rand}`).classList.add('selected'); }
            }
            updateUI();
        }

        function clearTicket() {
            if (isPlaying) return;
            playSound('click');
            for (let i = 1; i <= totalNumbers; i++) {
                const btn = document.getElementById(`num-${i}`);
                if (btn) { btn.classList.remove('selected', 'match'); }
            }
            document.getElementById('balls-container').innerHTML = '';
            selectedNumbers = [];
            updateUI();
        }

        async function startDraw() {
            if (isPlaying || selectedNumbers.length < maxSelections) return;
            initAudio();
            
            if (balance < ticketCost) {
                playSound('bonus');
                balance += 100;
                document.getElementById('status-message').innerText = "🎁 Безкоштовний бонус +100 UA нараховано!";
                document.getElementById('balance-display').innerText = `${balance} UA`;
                await new Promise(r => setTimeout(r, 1200));
            }

            isPlaying = true; 
            balance -= ticketCost; 
            updateUI();
            
            document.getElementById('status-message').innerText = "🎰 Лототрон запускається...";
            document.getElementById('balls-container').innerHTML = '';
            
            winningNumbers = [];
            while (winningNumbers.length < maxSelections) {
                await new Promise(r => setTimeout(r, 900));
                let rand = Math.floor(Math.random() * totalNumbers) + 1;
                if (!winningNumbers.includes(rand)) {
                    winningNumbers.push(rand);
                    playSound('ball');
                    const ball = document.createElement('div');
                    ball.className = 'lottery-ball'; ball.innerText = rand;
                    document.getElementById('balls-container').appendChild(ball);
                    if (selectedNumbers.includes(rand)) document.getElementById(`num-${rand}`).classList.add('match');
                }
            }
            
            const matches = selectedNumbers.filter(n => winningNumbers.includes(n)).length;
            let win = (matches === 5) ? 5000 : (matches === 4) ? 500 : (matches * 10);
            balance += win;
            
            if (win > 0) { playSound('win'); document.getElementById('status-message').innerText = `🎉 Перемога! Виграш: ${win} UA`; } 
            else { playSound('lose'); document.getElementById('status-message').innerText = "😔 Не пощастило. Спробуйте ще раз!"; }
            
            isPlaying = false; needResetAfterGame = true; updateUI();
        }

        updateUI();
    </script>
</body>
</html>
