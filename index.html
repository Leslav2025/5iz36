<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UA Lottery 5 із 36 + TON</title>
    <!-- Підключаємо офіційний TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .header-ton {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        #ton-connect-btn {
            scale: 0.9;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-val {
            font-weight: bold;
            color: #38bdf8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .cell {
            aspect-ratio: 1;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .cell.selected {
            background: #f59e0b;
            border-color: #fbbf24;
            color: #0f172a;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .drum-section {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .ball-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 54px;
            align-items: center;
            margin-top: 10px;
        }
        .result-ball {
            width: 44px;
            height: 44px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #2563eb);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-primary {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-ton-pay {
            background: #0098ea;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 152, 234, 0.3);
            margin-top: 10px;
            width: 100%;
            display: none;
        }
        .btn-secondary {
            background: #475569;
            color: #f8fafc;
        }
        .message-box {
            font-size: 14px;
            font-weight: 500;
            min-height: 24px;
            color: #38bdf8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-ton">
        <h1>UA LOTTERY</h1>
        <div id="ton-connect-btn"></div>
    </div>
    
    <div class="subtitle">Обери 5 чисел із 36</div>

    <div class="stats-panel">
        <div>Баланс: <span id="balance" class="stat-val">0</span> UA</div>
        <div>Ставка: <span class="stat-val">50</span> UA</div>
    </div>

    <div class="grid" id="lottery-grid"></div>

    <div class="btn-group">
        <button class="btn-secondary" onclick="autoSelect()">Автовибір</button>
        <button class="btn-secondary" onclick="clearSelection()">Очистити</button>
    </div>

    <div class="drum-section">
        <div id="drum-status">Лототрон чекає на ставку</div>
        <div class="ball-container" id="winning-balls"></div>
    </div>

    <button class="btn-primary" id="btn-play" onclick="handlePlayClick()" disabled>Зробити ставку</button>
    
    <!-- Кнопка купівлі монет UA -->
    <button class="btn-ton-pay" id="btn-buy-coins" onclick="buyCoinsWithTon()">Поповнити: 1000 UA за 0.01 TON</button>
    
    <div class="message-box" id="message"></div>
</div>

<script>
    const MY_TON_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw"; 

    const TOTAL_NUMBERS = 36;
    const REQUIRED_SELECTION = 5;
    const TICKET_COST = 50;
    
    let selectedNumbers = [];
    
    // ПЕРЕВІРКА СЕЙФУ: завантажуємо збережений баланс або ставимо 0, якщо гра відкрита вперше
    let balance = parseInt(localStorage.getItem('ua_lottery_balance')) || 0; 
    document.getElementById('balance').innerText = balance;

    let isPlaying = false;

    // Ініціалізація TON Connect UI
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/5iz36/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    // Автоматично додаємо монети, якщо сторінка перезапустилася ПІСЛЯ успішного виклику гаманця
    if (localStorage.getItem('pending_payment') === 'true') {
        balance += 1000;
        localStorage.setItem('ua_lottery_balance', balance);
        localStorage.removeItem('pending_payment'); // Очищаємо прапорець очікування
        document.getElementById('balance').innerText = balance;
        document.getElementById('message').style.color = '#10b981';
        document.getElementById('message').innerText = "Баланс відновлено та оновлено: +1000 UA 💎";
    }

    // Створення сітки
    const grid = document.getElementById('lottery-grid');
    for (let i = 1; i <= TOTAL_NUMBERS; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i;
        cell.onclick = () => toggleNumber(i, cell);
        grid.appendChild(cell);
    }

    function toggleNumber(num, cellElement) {
        if (isPlaying) return;
        const index = selectedNumbers.indexOf(num);
        if (index > -1) {
            selectedNumbers.splice(index, 1);
            cellElement.classList.remove('selected');
        } else {
            if (selectedNumbers.length >= REQUIRED_SELECTION) return;
            selectedNumbers.push(num);
            cellElement.classList.add('selected');
        }
        updatePlayButtonState();
    }

    function updatePlayButtonState() {
        const btnPlay = document.getElementById('btn-play');
        const btnBuy = document.getElementById('btn-buy-coins');
        
        btnPlay.disabled = selectedNumbers.length !== REQUIRED_SELECTION || isPlaying;
        
        if (balance < TICKET_COST) {
            btnBuy.style.display = "block";
        } else {
            btnBuy.style.display = "none";
        }
    }

    // Викликаємо перевірку кнопок одразу при старті гри
    updatePlayButtonState();

    function handlePlayClick() {
        if (balance < TICKET_COST) {
            document.getElementById('message').style.color = '#ef4444';
            document.getElementById('message').innerText = "Недостатньо балансу UA! Поповніть через TON нижче.";
            return;
        }
        startRaffle();
    }

    // Робота з транзакцією та збереженням стану в пам'ять телефона
    async function buyCoinsWithTon() {
        if (!tonConnectUI.connected) {
            alert("Будь ласка, спочатку підключіть свій TON-гаманець кнопкою у верхньому правому кутку!");
            return;
        }

        document.getElementById('message').style.color = '#38bdf8';
        document.getElementById('message').innerText = "Відкриваємо гаманець... Підтвердіть оплату.";

        // Перед викликом гаманця ставимо помітку "очікує оплати".
        // Якщо телефон перезапустить сторінку, гра побачить її і додасть +1000 UA автоматично!
        localStorage.setItem('pending_payment', 'true');

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 120,
            messages: [
                {
                    address: MY_TON_WALLET,
                    amount: "10000000" // 0.01 TON
                }
            ]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            
            // Якщо телефон НЕ перезавантажив сторінку і все пройшло гладко в додатку:
            balance += 1000;
            localStorage.setItem('ua_lottery_balance', balance);
            localStorage.removeItem('pending_payment');
            document.getElementById('balance').innerText = balance;
            document.getElementById('message').style.color = '#10b981';
            document.getElementById('message').innerText = "Успішно нараховано +1000 UA 💎";
            updatePlayButtonState();

        } catch (error) {
            console.error(error);
            // Якщо користувач сам скасував операцію, прибираємо помітку
            localStorage.removeItem('pending_payment');
            document.getElementById('message').style.color = '#ef4444';
            document.getElementById('message').innerText = "Оплату скасовано або стався збій.";
        }
    }

    function autoSelect() {
        if (isPlaying) return;
        clearSelection();
        while (selectedNumbers.length < REQUIRED_SELECTION) {
            const rand = Math.floor(Math.random() * TOTAL_NUMBERS) + 1;
            if (!selectedNumbers.includes(rand)) selectedNumbers.push(rand);
        }
        document.querySelectorAll('.cell').forEach((cell, idx) => {
            if (selectedNumbers.includes(idx + 1)) cell.classList.add('selected');
        });
        updatePlayButtonState();
    }

    function clearSelection() {
        if (isPlaying) return;
        selectedNumbers = [];
        document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('selected'));
        updatePlayButtonState();
    }

    function startRaffle() {
        isPlaying = true;
        balance -= TICKET_COST;
        localStorage.setItem('ua_lottery_balance', balance); // Зберігаємо зменшений баланс
        document.getElementById('balance').innerText = balance;
        updatePlayButtonState();
        
        document.getElementById('message').innerText = "";
        document.getElementById('drum-status').innerText = "Лототрон перемішує кульки...";
        const ballContainer = document.getElementById('winning-balls');
        ballContainer.innerHTML = '';

        let winningNumbers = [];
        while (winningNumbers.length < REQUIRED_SELECTION) {
            const rand = Math.floor(Math.random() * TOTAL_NUMBERS) + 1;
            if (!winningNumbers.includes(rand)) winningNumbers.push(rand);
        }

        let step = 0;
        const interval = setInterval(() => {
            if (step < REQUIRED_SELECTION) {
                const ball = document.createElement('div');
                ball.className = 'result-ball';
                ball.innerText = winningNumbers[step];
                ballContainer.appendChild(ball);
                step++;
            } else {
                clearInterval(interval);
                checkResults(winningNumbers);
            }
        }, 800);
    }

    function checkResults(winningNumbers) {
        const matches = selectedNumbers.filter(num => winningNumbers.includes(num)).length;
        let prize = 0;

        if (matches === 2) prize = 50;
        else if (matches === 3) prize = 250;
        else if (matches === 4) prize = 1500;
        else if (matches === 5) prize = 50000;

        balance += prize;
        localStorage.setItem('ua_lottery_balance', balance); // Зберігаємо новий баланс після гри в "сейф"
        document.getElementById('balance').innerText = balance;
        document.getElementById('drum-status').innerText = "Розіграш завершено!";
        
        const msgElement = document.getElementById('message');
        if (prize > 0) {
            msgElement.style.color = '#10b981';
            msgElement.innerText = `Вгадано чисел: ${matches}! Ваш виграш: +${prize} UA 🎉`;
        } else {
            msgElement.style.color = '#ef4444';
            msgElement.innerText = `Вгадано чисел: ${matches}. Пощастить наступного разу!`;
        }

        isPlaying = false;
        updatePlayButtonState();
    }
</script>
</body>
</html>
